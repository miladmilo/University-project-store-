<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تکمیل خرید | Nike Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <title> Similar to the Nike site</title>
    <link rel="icon" type="image/png" href="src/img/nike-4-logo-png-transparent.png">
    
</head>
<body class="bg-gray-50">
    <header>
        <!-- کپی هدر از index.html -->
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-6xl mx-auto">
            <!-- Progress Steps -->
            <div class="flex justify-center mb-10">
                <div class="flex items-center w-full max-w-2xl">
                    <div class="flex-1 text-center">
                        <div class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center mx-auto mb-2">1</div>
                        <span class="text-sm font-semibold"> shopping cart</span>
                    </div>
                    <div class="flex-1 h-1 bg-gray-300"></div>
                    <div class="flex-1 text-center">
                        <div class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center mx-auto mb-2">2</div>
                        <span class="text-sm font-semibold"> Shipping information</span>
                    </div>
                    <div class="flex-1 h-1 bg-gray-300"></div>
                    <div class="flex-1 text-center">
                        <div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center mx-auto mb-2">3</div>
                        <span class="text-sm text-gray-500">payment</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- فرم اطلاعات -->
                <div class="lg:w-2/3">
                    <form id="checkoutForm" class="space-y-6">
                        <!-- اطلاعات شخصی -->
                        <div class="bg-white p-6 rounded-lg shadow-sm">
                            <h3 class="font-bold text-xl mb-4"> اطلاعات شخصی</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2">نام *</label>
                                    <input type="text" required class="w-full border rounded-lg px-4 py-3">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">نام خانوادگی *</label>
                                    <input type="text" required class="w-full border rounded-lg px-4 py-3">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-medium mb-2">شماره موبایل *</label>
                                    <input type="tel" required pattern="09[0-9]{9}" class="w-full border rounded-lg px-4 py-3" placeholder="09123456789">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-medium mb-2">ایمیل</label>
                                    <input type="email" class="w-full border rounded-lg px-4 py-3">
                                </div>
                            </div>
                        </div>

                        <!-- آدرس -->
                        <div class="bg-white p-6 rounded-lg shadow-sm">
                            <h3 class="font-bold text-xl mb-4">آدرس ارسال</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2">استان *</label>
                                    <select required class="w-full border rounded-lg px-4 py-3">
                                        <option value="">انتخاب کنید</option>
                                        <option value="tehran">تهران</option>
                                        <!-- استان‌های دیگر -->
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">شهر *</label>
                                    <select required class="w-full border rounded-lg px-4 py-3">
                                        <option value="">انتخاب کنید</option>
                                        <option value="tehran">تهران</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">آدرس کامل *</label>
                                    <textarea required rows="3" class="w-full border rounded-lg px-4 py-3" placeholder="خیابان، پلاک، واحد، کد پستی"></textarea>
                                </div>
                                <div>
                                    <label class="flex items-center">
                                        <input type="checkbox" class="ml-2">
                                        <span>ذخیره این آدرس برای خریدهای بعدی</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- روش ارسال -->
                        <div class="bg-white p-6 rounded-lg shadow-sm">
                            <h3 class="font-bold text-xl mb-4">روش ارسال</h3>
                            <div class="space-y-3">
                                <label class="flex items-center justify-between p-4 border rounded-lg cursor-pointer hover:bg-gray-50">
                                    <div class="flex items-center">
                                        <input type="radio" name="shipping" value="express" checked class="ml-3">
                                        <div>
                                            <span class="font-semibold">پیک موتوری (تحویل 2 ساعته)</span>
                                            <p class="text-sm text-gray-600 mt-1">تهران و حومه</p>
                                        </div>
                                    </div>
                                    <span class="font-bold">50,000 تومان</span>
                                </label>
                                <label class="flex items-center justify-between p-4 border rounded-lg cursor-pointer hover:bg-gray-50">
                                    <div class="flex items-center">
                                        <input type="radio" name="shipping" value="standard" class="ml-3">
                                        <div>
                                            <span class="font-semibold">پست پیشتاز</span>
                                            <p class="text-sm text-gray-600 mt-1">تحویل 3-5 روز کاری</p>
                                        </div>
                                    </div>
                                    <span class="font-bold">30,000 تومان</span>
                                </label>
                            </div>
                        </div>

                        <!-- ادامه دکمه -->
                        <div class="flex justify-between">
                            <a href="cart.html" class="px-6 py-3 border rounded-lg hover:bg-gray-50">
                                ← بازگشت به سبد خرید
                            </a>
                            <button type="submit" class="px-8 py-3 bg-black text-white rounded-lg hover:bg-gray-800">
                                ادامه به پرداخت
                            </button>
                        </div>
                    </form>
                </div>

                <!-- خلاصه سفارش -->
                <div class="lg:w-1/3">
                    <div class="bg-white p-6 rounded-lg shadow-sm sticky top-6">
                        <h3 class="font-bold text-xl mb-4">خلاصه سفارش</h3>
                        
                        <div id="orderSummary" class="mb-6">
                            <!-- با JS پر می‌شود -->
                        </div>
                        
                        <div class="space-y-3 border-t pt-4">
                            <div class="flex justify-between">
                                <span>جمع کل کالاها</span>
                                <span id="itemsTotal">0 تومان</span>
                            </div>
                            <div class="flex justify-between">
                                <span>هزینه ارسال</span>
                                <span id="shippingFee">0 تومان</span>
                            </div>
                            <div class="flex justify-between text-lg font-bold border-t pt-3">
                                <span>مبلغ قابل پرداخت</span>
                                <span id="orderTotal">0 تومان</span>
                            </div>
                        </div>
                        
                        <!-- کد تخفیف -->
                        <div class="mt-6">
                            <div class="flex gap-2">
                                <input type="text" id="discountCode" placeholder="کد تخفیف" class="flex-grow border rounded-lg px-4 py-2">
                                <button id="applyDiscount" class="px-4 py-2 border rounded-lg hover:bg-gray-50">اعمال</button>
                            </div>
                            <div id="discountMessage" class="text-sm mt-2 hidden"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/card.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/products.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
    <!-- در صفحات HTML -->
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
