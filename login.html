<!-- login.html -->
<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به حساب | Nike Store</title>
        <link rel="stylesheet" href="src/output.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
        <!-- لوگو -->
        <div class="text-center mb-8">
            <img src="src/img/nike-4-logo-png-transparent.png" alt="Nike" class="h-12 mx-auto mb-4">
            <h1 class="text-2xl font-bold">ورود به حساب کاربری</h1>
            <p class="text-gray-600 mt-2">لطفا اطلاعات خود را وارد کنید</p>
        </div>
        
        <!-- فرم ورود -->
        <form id="loginForm" class="space-y-6">
            <!-- ایمیل -->
            <div>
                <label class="block text-sm font-medium mb-2">ایمیل</label>
                <input type="email" 
                       name="email" 
                       required
                       placeholder="example@email.com"
                       class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <!-- رمز عبور -->
            <div>
                <label class="block text-sm font-medium mb-2">رمز عبور</label>
                <input type="password" 
                       name="password" 
                       required
                       placeholder="••••••••"
                       class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <!-- یادآوری رمز -->
            <div class="flex justify-between items-center">
                <label class="flex items-center">
                    <input type="checkbox" name="remember" class="ml-2">
                    <span class="text-sm">مرا به خاطر بسپار</span>
                </label>
                <a href="#" class="text-sm text-blue-600 hover:text-blue-800">فراموشی رمز عبور</a>
            </div>
            
            <!-- دکمه ورود -->
            <button type="submit" 
                    class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition-colors">
                ورود به حساب
            </button>
            
            <!-- ثبت‌نام -->
            <div class="text-center pt-4 border-t">
                <p class="text-gray-600">حساب کاربری ندارید؟</p>
                <a href="register.html" class="text-blue-600 hover:text-blue-800 font-medium">
                    ایجاد حساب جدید
                </a>
            </div>
        </form>
        
        <!-- پیام تست -->
        <div id="testInfo" class="mt-6 p-4 bg-blue-50 rounded-lg text-sm text-blue-800">
            <p><strong>برای تست:</strong></p>
            <p>ایمیل: admin@nike.com</p>
            <p>رمز عبور: admin123</p>
        </div>
    </div>
    
    <!-- اسکریپت‌ها -->
    <script src="js/auth.js"></script>
    <script src="js/init-login.js"></script>
    
    <script>
        // لاگ برای دیباگ
        console.log('🔍 صفحه ورود بارگذاری شد');
        console.log('URL:', window.location.href);
        
        // بررسی localStorage
        console.log('📁 داده‌های localStorage:');
        console.log('currentUser:', localStorage.getItem('currentUser'));
        console.log('users:', localStorage.getItem('users'));
        
        // اگر کاربر قبلا لاگین کرده، ریدایرکت
        if (localStorage.getItem('currentUser')) {
            console.log('✅ کاربر قبلا لاگین کرده، ریدایرکت به داشبورد...');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }
    </script>
</body>
</html>
